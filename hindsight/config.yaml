name: Hindsight
slug: hindsight
description: Host Hindsight inside Home Assistant with Ingress
version: 0.3.5
url: https://github.com/stuartp44/HindsightHomeAssistant/tree/main/hindsight
startup: application
boot: auto
init: false
webui: http://[HOST]:[PORT:9999]/
ports:
  8888/tcp: 8888
  9999/tcp: 9999
ports_description:
  8888/tcp: Hindsight API
  9999/tcp: Hindsight Control Plane UI
panel_title: Hindsight
panel_icon: mdi:eye-outline
arch:
  - aarch64
  - amd64
map:
  - type: addon_config
    read_only: false
options:
  llm_api_key: ''
  llm_provider: openai
  llm_model: gpt-4o-mini
schema:
  llm_api_key: password
  llm_provider: list(openai|anthropic|gemini|groq|ollama|lmstudio|minimax|atlas)
  llm_model: str
